tags:
  basedir:  /global/cfs/cdirs/sobs/metadata/lat
  manifestdir: /global/cfs/cdirs/sobs/metadata/lat/manifests/
  relcaldir: /global/cfs/cdirs/sobs/users/twmorris/shared/lat/relcal/20260129/
  detmatchdir: /global/cfs/cdirs/sobs/users/mmccrack/so/det_match/lat/260204_aso/aso/focal_planes_260517/results/
  focalplanedir: /global/cfs/cdirs/sobs/lat-iso/aso/v1/contexts/
  preprocessdir: /global/cfs/cdirs/sobs/lat-iso/aso/v1/preprocessing/archives_lf/


imports:
  - sotodlib.io.load_book
  - sotodlib.io.metadata

obsfiledb: '{basedir}/lat_obsfiledb_local.sqlite'
obsdb: '{basedir}/lat_obsdb_240911m_local.sqlite'

obs_loader_type: 'obs-book'
obs_colon_tags: [wafer.bandpass, wafer_slot]

metadata:
  - db: '{manifestdir}/smurf_detsets/v0/smurf_detset_info_local.sqlite'
    label: smurf
    det_info: true
  - db: '{detmatchdir}/assignment.sqlite'
    label: assignment
    det_info: true
    on_missing: trim
  # - db: '{manifestdir}/det_match/lat_det_match_260520m/det_match.sqlite'
  #   label: det_info
  #   det_info: True
  #   load_fields:
  #     - 'dets:readout_id'
  #     - 'wafer_slot': 'dets:wafer.wafer_slot'
    on_missing: trim
  - db: '{manifestdir}/wafer_info/lat_wafer_info_260301r1/wafer_info_local.sqlite'
    label: wafer_info
    det_info: true
    on_missing: fail
  - db: '{manifestdir}/det_cal/lat_det_cal_260216m/det_cal_local.sqlite'
    label: det_cal
    unpack: det_cal
    # on_missing: fail  ## work-around for variable mask
    on_missing: trim
  - db: '{manifestdir}/pointing_model/lat_pointing_model_260423r1/db_local.sqlite'
    label: pointing_model
    unpack: pointing_model
  - db: '{focalplanedir}/db_local.sqlite'
    label: focal_plane
    unpack: focal_plane
    on_missing: trim
  # - db: '{focalplanedir}/db_local.sqlite'
  #   label: focal_plane
  #   det_info: True
  #   load_fields:
  #     - 'dets:det_id'
  #     - 'wafer_name': 'dets:wafer_name'
    # on_missing: trim
  # - db: '{manifestdir}/abscal/lat_abscal_260519/db_local.sqlite'
  #   label: abscal
  #   unpack:
  #   - abscal
  # - db: '{relcaldir}/lat_relcal_20260129.sqlite'
  #   label: relcal
  #   unpack:
  #   - relcal
  - db: '{preprocessdir}/process_archive.sqlite'
    label: preprocess
    unpack: preprocess
